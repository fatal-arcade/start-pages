<!doctype html>

<html lang="en">

    <head>
        
        <!--title-->
        <title>Start Pages - Index</title>
        
        <!--metatags-->
        <meta charset="UTF-8">
        <meta name="viewport"               content="width=device-width, initial-scale=1.0">
        <meta name="referrer"               content="strict-origin-when-cross-origin">
        <meta name="description"            content="Customized start pages for your browser; created by Fatal Arcade.">

        <!--open graph-->
        <meta property="og:title"           content="Your Catchy Page Title">
        <meta property="og:description"     content="A short description for social feeds.">
        <meta property="og:image"           content="https://example.com/assets/social-preview.jpg">
        <meta property="og:url"             content="https://example.com/page-url">
        <meta property="og:type"            content="website">

        <!--twitter-->
        <meta name="twitter:card"           content="summary_large_image">
        <meta name="twitter:title"          content="Your Catchy Page Title">
        <meta name="twitter:description"    content="A short description for social feeds.">
        <meta name="twitter:image"          content="https://example.com/assets/social-preview.jpg">

        <!--stylesheets-->
        <link rel="stylesheet" href="styles/index.css">
        
        <!--scripts-->
        <script type="module" src="scripts/index.js"></script>

    </head>


    <body>

        <div data-widget="bookmarks" data-category="General" class="card"></div>
        -->
        <div data-widget="searchbar" data-placeholder="Search the web..." class="browser-search-bar"></div>
        

    </body>



</html>
